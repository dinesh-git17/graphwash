name: pr-label

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  kind:
    name: kind
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  size:
    name: size
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: CodelyTV/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: "size:xs"
          xs_max_size: "10"
          s_label: "size:s"
          s_max_size: "100"
          m_label: "size:m"
          m_max_size: "500"
          l_label: "size:l"
          l_max_size: "1000"
          xl_label: "size:l"
          fail_if_xl: "false"
          message_if_xl: ""
