version: 2

updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Toronto
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: torch
      - dependency-name: torchvision
      - dependency-name: torchaudio
      - dependency-name: torch-geometric
      - dependency-name: torch-scatter
      - dependency-name: torch-sparse
      - dependency-name: torch-cluster

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Toronto
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
