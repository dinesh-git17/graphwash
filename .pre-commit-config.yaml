default_stages: [pre-commit]
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
        exclude: ^docs/figures/
      - id: check-case-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - chore
          - docs
          - refactor
          - test
          - infra
          - ops
          - spike

  - repo: local
    hooks:
      - id: enforce-scope
        name: Require t-NNN or training commit scope
        language: system
        entry: bash scripts/check-commit-scope.sh
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: mypy-strict
        name: mypy --strict (project-wide, src/)
        language: system
        entry: uv run mypy --strict src
        stages: [pre-push]
        pass_filenames: false
        always_run: true

      - id: pytest-full
        name: pytest (full suite, no coverage)
        language: system
        entry: uv run pytest -q --no-cov
        stages: [pre-push]
        pass_filenames: false
        always_run: true
